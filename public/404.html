<!DOCTYPE html>
<html>
  <head>
    <title>Paul's Portfolio</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Get to know a bit more about Eduardo Paul Contardi Soria and his works." />
    <script>
      // SPA redirect for GitHub Pages
      // Redirects all paths to index.html preserving the original path as a query param
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
    <!-- Open Graph fallback for paths not covered by pre-generated pages -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://eduardopaulcs.com" />
    <meta property="og:title" content="Paul's Portfolio" />
    <meta property="og:description" content="Get to know a bit more about Eduardo Paul Contardi Soria and his works." />
    <meta property="og:image" content="https://eduardopaulcs.com/logo512.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_AR" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Paul's Portfolio" />
    <meta name="twitter:description" content="Get to know a bit more about Eduardo Paul Contardi Soria and his works." />
    <meta name="twitter:image" content="https://eduardopaulcs.com/logo512.png" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="theme-color" content="#5c8099" />
  </head>
  <body></body>
</html>
